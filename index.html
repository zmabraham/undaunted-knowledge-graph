<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undaunted Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin-top: 0.25rem;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - 100px);
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f4f4f5;
        }

        .filter-section {
            margin-bottom: 1.5rem;
        }

        .filter-section label {
            display: block;
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 0.5rem;
        }

        .type-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .type-btn {
            padding: 0.4rem 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #e4e4e7;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .type-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .relationship-filters {
            margin-top: 1rem;
        }

        .rel-btn {
            padding: 0.3rem 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            color: #a1a1aa;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .rel-btn.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
            color: #e4e4e7;
        }

        .stats {
            font-size: 0.85rem;
            color: #a1a1aa;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .graph-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        .details-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            overflow-y: auto;
        }

        .details-panel h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f4f4f5;
        }

        .entity-details {
            font-size: 0.85rem;
        }

        .entity-type {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .entity-type.PERSON { background: #3b82f6; color: white; }
        .entity-type.PLACE { background: #10b981; color: white; }
        .entity-type.EVENT { background: #f59e0b; color: white; }
        .entity-type.INSTITUTION { background: #8b5cf6; color: white; }
        .entity-type.COMMUNITY { background: #ec4899; color: white; }
        .entity-type.CONCEPT { background: #14b8a6; color: white; }
        .entity-type.TEACHING { background: #f97316; color: white; }

        .detail-row {
            display: flex;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            font-weight: 600;
            color: #a1a1aa;
            min-width: 90px;
            font-size: 0.8rem;
        }

        .detail-value {
            color: #e4e4e7;
            flex: 1;
            word-break: break-word;
            font-size: 0.8rem;
        }

        .passage {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.6rem;
            border-radius: 8px;
            font-style: italic;
            font-size: 0.75rem;
            color: #a1a1aa;
            margin-top: 0.75rem;
            line-height: 1.5;
        }

        .search-box {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #e4e4e7;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .search-box::placeholder {
            color: #71717a;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .node {
            cursor: pointer;
            transition: all 0.2s;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .link {
            stroke-opacity: 0.25;
        }

        .link:hover {
            stroke-opacity: 0.6;
        }

        .link-label {
            font-size: 9px;
            fill: #71717a;
            pointer-events: none;
        }

        .zoom-controls {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .legend {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            color: #a1a1aa;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        .relationships-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .relationship-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }

        .relationship-item .rel-type {
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 450px auto;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Undaunted Knowledge Graph</h1>
        <p>Interactive visualization with relationships from "Undaunted"</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <h2>Filters</h2>

            <div class="filter-section">
                <label>Search</label>
                <input type="text" class="search-box" id="searchInput" placeholder="Search entities...">
            </div>

            <div class="filter-section">
                <label>Entity Types</label>
                <div class="type-buttons" id="typeFilters"></div>
            </div>

            <div class="filter-section">
                <label>Show Relationships</label>
                <label style="font-weight: normal; font-size: 0.75rem;">
                    <input type="checkbox" id="showRelationships" checked> Display links
                </label>
            </div>

            <h2 style="margin-top: 1.5rem;">Statistics</h2>
            <div class="stats" id="stats"></div>
        </div>

        <div class="graph-container">
            <div id="graph"></div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomIn()">+</button>
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <button class="zoom-btn" onclick="resetZoom()">⟲</button>
            </div>
            <div class="legend" id="legend"></div>
        </div>

        <div class="details-panel">
            <h2>Entity Details</h2>
            <div id="entityDetails">
                <p style="color: #71717a; font-style: italic; font-size: 0.85rem;">Click on a node to view details and relationships</p>
            </div>
        </div>
    </div>

    <script>
        const typeColors = {
            PERSON: '#3b82f6',
            PLACE: '#10b981',
            EVENT: '#f59e0b',
            INSTITUTION: '#8b5cf6',
            COMMUNITY: '#ec4899',
            CONCEPT: '#14b8a6',
            TEACHING: '#f97316'
        };

        let rawData = [];
        let nodes = [];
        let links = [];
        let simulation;
        let svg, g, zoom;
        let activeTypes = new Set(Object.keys(typeColors));
        let linkElements, nodeElements, labelElements, linkLabelElements;

        async function loadData() {
            try {
                const response = await fetch('undaunted_data.json');
                rawData = await response.json();
                processData();
            } catch (error) {
                console.error('Error loading data:', error);
                rawData = { extractions: [] };
                processData();
            }
        }

        function processData() {
            const extractions = rawData.extractions || [];
            const nodeMap = new Map();
            const idCounter = { person: 0, place: 0, event: 0, institution: 0, community: 0, concept: 0, teaching: 0 };
            const linkSet = new Set();

            // First pass: create all nodes
            extractions.forEach((ex, idx) => {
                const type = ex.node_type.toLowerCase();
                const data = ex.extracted_data;
                const name = data.name_en || data.name || data.title_en || `Entity ${idx}`;

                const typeKey = type === 'teaching' ? 'teaching' : type;
                const id = `${type}_${idCounter[typeKey]++}_${name.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30)}`;

                if (!nodeMap.has(id)) {
                    nodeMap.set(id, {
                        id: id,
                        name: name,
                        type: ex.node_type,
                        data: data,
                        passage: ex.passage,
                        related_entities: []
                    });
                }
            });

            nodes = Array.from(nodeMap.values());

            // Second pass: extract relationships from passages
            extractions.forEach((ex, idx) => {
                const passage = ex.passage;
                const data = ex.extracted_data;
                const name = data.name_en || data.name || data.title_en;

                // Find the main entity for this extraction
                const mainEntity = nodes.find(n =>
                    (n.data.name_en === name || n.name === name) && n.type === ex.node_type
                );

                if (!mainEntity) return;

                // Extract other entity names from the passage
                nodes.forEach(otherNode => {
                    if (otherNode.id === mainEntity.id) return;

                    const otherName = otherNode.data.name_en || otherNode.name;

                    // Check if other entity is mentioned in this passage
                    if (passage.includes(otherName) || passage.includes(otherNode.name)) {
                        // Determine relationship type based on entity types
                        const relType = determineRelationshipType(mainEntity, otherNode, passage);

                        if (relType) {
                            const linkId = `${mainEntity.id}-${otherNode.id}-${relType}`;
                            if (!linkSet.has(linkId)) {
                                linkSet.add(linkId);
                                links.push({
                                    source: mainEntity.id,
                                    target: otherNode.id,
                                    type: relType,
                                    id: linkId
                                });

                                // Track bidirectional relationships
                                if (!mainEntity.related_entities.includes(otherNode.id)) {
                                    mainEntity.related_entities.push(otherNode.id);
                                }
                            }
                        }
                    }
                });

                // Extract specific relationships from data fields
                extractSpecificRelationships(mainEntity, nodeMap, linkSet);
            });

            initGraph();
            updateStats();
            initFilters();
            initLegend();
        }

        function determineRelationshipType(source, target, passage) {
            const sourceType = source.type;
            const targetType = target.type;

            // Person -> Person relationships
            if (sourceType === 'PERSON' && targetType === 'PERSON') {
                if (passage.includes('student of') || passage.includes('taught')) return 'teacher_student';
                if (passage.includes('son of') || passage.includes('father')) return 'father_son';
                if (passage.includes('colleague') || passage.includes('fellow')) return 'colleague';
                if (source.data.roles && source.data.roles.some(r => target.name.includes(r))) return 'same_role';
                return 'associated';
            }

            // Person -> Place
            if (sourceType === 'PERSON' && targetType === 'PLACE') {
                if (source.data.birth_place === target.name) return 'born_in';
                if (source.data.death_place === target.name) return 'died_in';
                if (passage.includes('lived in') || passage.includes('resided in')) return 'lived_in';
                return 'connected_to';
            }

            // Person -> Institution
            if (sourceType === 'PERSON' && targetType === 'INSTITUTION') {
                if (source.data.roles && source.data.roles.some(r => target.data.name_en && r.includes(target.data.name_en))) return 'affiliated_with';
                if (passage.includes('director of') || passage.includes('led')) return 'led';
                if (passage.includes('founded')) return 'founder';
                return 'associated';
            }

            // Person -> Event
            if (sourceType === 'PERSON' && targetType === 'EVENT') {
                if (passage.includes('participated')) return 'participated_in';
                return 'connected_to';
            }

            // Person -> Teaching
            if (sourceType === 'PERSON' && targetType === 'TEACHING') {
                if (source.data.name_en === target.data.attributed_to_name) return 'authored';
                if (source.data.name_en === target.data.transmitted_by_name) return 'transmitted';
                return 'mentioned_in';
            }

            // Institution -> Place
            if (sourceType === 'INSTITUTION' && targetType === 'PLACE') {
                return 'located_in';
            }

            // Teaching -> Concept
            if (sourceType === 'TEACHING' && targetType === 'CONCEPT') {
                return 'illustrates';
            }

            return 'related';
        }

        function extractSpecificRelationships(entity, nodeMap, linkSet) {
            const data = entity.data;

            // Birth place relationship
            if (data.birth_place) {
                const target = nodes.find(n => n.name === data.birth_place || n.data.name_en === data.birth_place);
                if (target) addLink(entity.id, target.id, 'born_in', linkSet);
            }

            // Death place relationship
            if (data.death_place) {
                const target = nodes.find(n => n.name === data.death_place || n.data.name_en === data.death_place);
                if (target) addLink(entity.id, target.id, 'died_in', linkSet);
            }

            // Concept relationships
            if (data.concept_ids) {
                data.concept_ids.forEach(conceptId => {
                    const target = nodes.find(n => n.id.includes(conceptId) || n.data.name_en === conceptId);
                    if (target) addLink(entity.id, target.id, 'related_to', linkSet);
                });
            }

            // Event relationships
            if (data.event_id) {
                const target = nodes.find(n => n.id.includes(data.event_id) || n.data.title_en === data.event_id);
                if (target) addLink(entity.id, target.id, 'connected_to', linkSet);
            }

            // Participant relationships
            if (data.participants) {
                data.participants.forEach(participant => {
                    const target = nodes.find(n => n.name === participant || n.data.name_en === participant);
                    if (target) addLink(entity.id, target.id, 'participated_with', linkSet);
                });
            }
        }

        function addLink(sourceId, targetId, type, linkSet) {
            const linkId = `${sourceId}-${targetId}-${type}`;
            if (!linkSet.has(linkId) {
                linkSet.add(linkId);
                links.push({ source: sourceId, target: targetId, type: type, id: linkId });
            }
        }

        function initGraph() {
            const container = document.getElementById('graph');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .append('svg')
                .attr('width', width)
                .attr('height', height);

            zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            g = svg.append('g');

            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(d => getLinkDistance(d.type)))
                .force('charge', d3.forceManyBody().strength(d => getNodeCharge(d.type)))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => getNodeSize(d.type) + 5));

            // Create links group (behind nodes)
            const linkGroup = g.append('g').attr('class', 'links');

            // Create links
            linkElements = linkGroup.selectAll('line')
                .data(links)
                .join('line')
                .attr('class', 'link')
                .attr('stroke', d => getLinkColor(d.type))
                .attr('stroke-width', d => getLinkWidth(d.type))
                .attr('stroke-opacity', 0.3);

            // Add link labels
            linkLabelElements = linkGroup.selectAll('text')
                .data(links)
                .join('text')
                .attr('class', 'link-label')
                .text(d => d.type)
                .attr('font-size', '8px')
                .attr('fill', '#71717a')
                .attr('text-anchor', 'middle')
                .style('opacity', 0)
                .style('pointer-events', 'none');

            // Create nodes
            nodeElements = g.append('g')
                .selectAll('circle')
                .data(nodes)
                .join('circle')
                .attr('class', 'node')
                .attr('r', d => getNodeSize(d.type))
                .attr('fill', d => typeColors[d.type] || '#666')
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .on('click', showDetails)
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            // Add labels
            labelElements = g.append('g')
                .selectAll('text')
                .data(nodes)
                .join('text')
                .text(d => d.name.length > 18 ? d.name.substring(0, 18) + '...' : d.name)
                .attr('font-size', '9px')
                .attr('fill', '#e4e4e7')
                .attr('text-anchor', 'middle')
                .attr('dy', d => getNodeSize(d.type) + 12)
                .style('pointer-events', 'none');

            simulation.on('tick', () => {
                linkElements
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                linkLabelElements
                    .attr('x', d => (d.source.x + d.target.x) / 2)
                    .attr('y', d => (d.source.y + d.target.y) / 2);

                nodeElements
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);

                labelElements
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });
        }

        function getNodeSize(type) {
            const sizes = { PERSON: 14, PLACE: 11, EVENT: 9, INSTITUTION: 11, COMMUNITY: 13, CONCEPT: 7, TEACHING: 9 };
            return sizes[type] || 10;
        }

        function getNodeCharge(type) {
            const charges = { PERSON: -200, PLACE: -150, EVENT: -100, INSTITUTION: -150, COMMUNITY: -180, CONCEPT: -80, TEACHING: -120 };
            return charges[type] || -100;
        }

        function getLinkDistance(type) {
            const distances = {
                born_in: 80, died_in: 80, lived_in: 100, affiliated_with: 70,
                teacher_student: 60, father_son: 50, colleague: 70,
                participated_in: 90, authored: 50, transmitted: 50,
                located_in: 120, illustrates: 70, connected_to: 100,
                related: 90
            };
            return distances[type] || 80;
        }

        function getLinkColor(type) {
            const colors = {
                born_in: '#10b981', died_in: '#ef4444', lived_in: '#3b82f6',
                affiliated_with: '#8b5cf6', teacher_student: '#f59e0b',
                father_son: '#ec4899', colleague: '#6366f1',
                participated_in: '#f97316', authored: '#14b8a6',
                transmitted: '#8b5cf6', located_in: '#10b981',
                illustrates: '#f59e0b', connected_to: '#6b7280',
                related: '#4b5563'
            };
            return colors[type] || '#666';
        }

        function getLinkWidth(type) {
            const widths = { teacher_student: 2.5, father_son: 2, affiliated_with: 2 };
            return widths[type] || 1.5;
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function showDetails(event, d) {
            const detailsPanel = document.getElementById('entityDetails');

            let html = `<span class="entity-type ${d.type}">${d.type}</span>`;
            html += `<h3 style="margin-bottom: 0.75rem; color: #f4f4f5; font-size: 1.1rem;">${d.name}</h3>`;

            // Display entity data
            for (const [key, value] of Object.entries(d.data)) {
                if (key !== 'name' && key !== 'name_en' && key !== 'passage' && value) {
                    const displayValue = Array.isArray(value) ? value.join(', ') : value;
                    html += `<div class="detail-row">
                        <span class="detail-label">${formatKey(key)}:</span>
                        <span class="detail-value">${displayValue}</span>
                    </div>`;
                }
            }

            // Show relationships
            if (d.related_entities && d.related_entities.length > 0) {
                html += `<div class="relationships-section">
                    <h4 style="font-size: 0.8rem; color: #a1a1aa; margin-bottom: 0.5rem;">Connected To (${d.related_entities.length})</h4>`;

                    // Get connected nodes
                    d.related_entities.slice(0, 5).forEach(relatedId => {
                        const relatedNode = nodes.find(n => n.id === relatedId);
                        if (relatedNode) {
                            // Find the relationship type
                            const link = links.find(l =>
                                (l.source.id === d.id && l.target.id === relatedId) ||
                                (l.target.id === d.id && l.source.id === relatedId)
                            );

                            html += `<div class="relationship-item">
                                <span class="rel-type">${link ? link.type : 'related'}:</span>
                                <span style="color: ${typeColors[relatedNode.type]}">${relatedNode.name}</span>
                            </div>`;
                        }
                    });

                    if (d.related_entities.length > 5) {
                        html += `<div style="color: #71717a; font-size: 0.75rem; font-style: italic;">...and ${d.related_entities.length - 5} more</div>`;
                    }
                </div>`;
            }

            if (d.passage) {
                html += `<div class="passage">"${d.passage.substring(0, 200)}..."</div>`;
            }

            detailsPanel.innerHTML = html;
        }

        function formatKey(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function updateStats() {
            const stats = { nodes: {}, links: {} };

            nodes.forEach(n => {
                stats.nodes[n.type] = (stats.nodes[n.type] || 0) + 1;
            });

            links.forEach(l => {
                stats.links[l.type] = (stats.links[l.type] || 0) + 1;
            });

            let html = '<div class="stat-item"><span>Entities</span><span>' + nodes.length + '</span></div>';

            Object.entries(stats.nodes).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                html += `<div class="stat-item"><span>${type}</span><span>${count}</span></div>`;
            });

            html += '<div class="stat-item" style="margin-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.5rem;"><span>Relationships</span><span>' + links.length + '</span></div>';

            Object.entries(stats.links).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                html += `<div class="stat-item"><span>${type}</span><span>${count}</span></div>`;
            });

            document.getElementById('stats').innerHTML = html;
        }

        function initFilters() {
            const container = document.getElementById('typeFilters');

            Object.entries(typeColors).forEach(([type, color]) => {
                const btn = document.createElement('button');
                btn.className = 'type-btn active';
                btn.textContent = type;
                btn.onclick = () => toggleFilter(type, btn);
                container.appendChild(btn);
            });

            // Relationship toggle
            document.getElementById('showRelationships').addEventListener('change', updateGraph);
        }

        function toggleFilter(type, btn) {
            if (activeTypes.has(type)) {
                if (activeTypes.size > 1) {
                    activeTypes.delete(type);
                    btn.classList.remove('active');
                }
            } else {
                activeTypes.add(type);
                btn.classList.add('active');
            }
            updateGraph();
        }

        function updateGraph() {
            const showRel = document.getElementById('showRelationships').checked;

            const filteredNodes = nodes.filter(n => activeTypes.has(n.type));
            const filteredIds = new Set(filteredNodes.map(n => n.id));

            const filteredLinks = showRel ? links.filter(l => filteredIds.has(l.source.id) && filteredIds.has(l.target.id)) : [];
            const filteredLinkSet = new Set(filteredLinks.map(l => l.id));

            // Update simulation
            simulation.nodes(filteredNodes);
            simulation.force('link').links(filteredLinks);

            // Update links
            linkElements = g.select('.links').selectAll('line')
                .data(filteredLinks, d => d.id);
            linkElements.enter().append('line')
                .attr('class', 'link')
                .attr('stroke', d => getLinkColor(d.type))
                .attr('stroke-width', d => getLinkWidth(d.type))
                .attr('stroke-opacity', 0.3)
                .merge(linkElements);
            linkElements.exit().remove();

            // Update link labels
            linkLabelElements = g.select('.links').selectAll('text')
                .data(filteredLinks, d => d.id);
            linkLabelElements.enter().append('text')
                .attr('class', 'link-label')
                .text(d => d.type)
                .attr('font-size', '8px')
                .attr('fill', '#71717a')
                .attr('text-anchor', 'middle')
                .style('opacity', 0)
                .style('pointer-events', 'none')
                .merge(linkLabelElements);
            linkLabelElements.exit().remove();

            // Update nodes
            nodeElements = g.selectAll('.node')
                .data(filteredNodes, d => d.id);
            nodeElements.enter().append('circle')
                .attr('class', 'node')
                .attr('r', d => getNodeSize(d.type))
                .attr('fill', d => typeColors[d.type] || '#666')
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .on('click', showDetails)
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .merge(nodeElements);
            nodeElements.exit().remove();

            // Update labels
            labelElements = g.selectAll('text')
                .data(filteredNodes, d => d.id);
            labelElements.enter().append('text')
                .text(d => d.name.length > 18 ? d.name.substring(0, 18) + '...' : d.name)
                .attr('font-size', '9px')
                .attr('fill', '#e4e4e7')
                .attr('text-anchor', 'middle')
                .attr('dy', d => getNodeSize(d.type) + 12)
                .style('pointer-events', 'none')
                .merge(labelElements);
            labelElements.exit().remove();

            simulation.alpha(1).restart();
        }

        function initLegend() {
            const container = document.getElementById('legend');

            Object.entries(typeColors).forEach(([type, color]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<div class="legend-color" style="background: ${color}"></div>${type}`;
                container.appendChild(item);
            });
        }

        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }

        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }

        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();

            if (query.length < 2) {
                g.selectAll('.node').attr('opacity', 1);
                return;
            }

            g.selectAll('.node').attr('opacity', d =>
                d.name.toLowerCase().includes(query) ? 1 : 0.2
            );
        });

        // Initialize
        loadData();
    </script>
</body>
</html>
