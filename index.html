<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undaunted - Timeline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a1a1aa;
            margin-top: 0.5rem;
        }

        .timeline-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            padding: 2rem 0;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            border-radius: 2px;
        }

        .timeline-event {
            position: relative;
            margin-bottom: 2.5rem;
            width: 50%;
            padding: 0 2rem;
        }

        .timeline-event:nth-child(odd) {
            left: 0;
            text-align: right;
        }

        .timeline-event:nth-child(even) {
            left: 50%;
            text-align: left;
        }

        .timeline-event-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #f59e0b;
            border: 3px solid #1a1a2e;
            border-radius: 50%;
            top: 5px;
            z-index: 1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .timeline-event:nth-child(odd) .timeline-event-dot {
            right: -8px;
        }

        .timeline-event:nth-child(even) .timeline-event-dot {
            left: -8px;
        }

        .timeline-event-dot:hover {
            transform: scale(1.3);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .event-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
        }

        .event-year {
            font-size: 0.8rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .event-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f4f4f5;
            margin-bottom: 0.5rem;
        }

        .event-description {
            font-size: 0.85rem;
            color: #a1a1aa;
            line-height: 1.5;
        }

        .stats {
            text-align: center;
            margin-bottom: 2rem;
            color: #a1a1aa;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #a1a1aa;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .timeline-container::before {
                left: 20px;
            }

            .timeline-event {
                width: 100%;
                padding-left: 3rem;
                padding-right: 0;
                text-align: left !important;
            }

            .timeline-event:nth-child(odd),
            .timeline-event:nth-child(even) {
                left: 0;
            }

            .timeline-event-dot {
                left: 12px !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Undaunted</h1>
        <p>A Chronological Timeline of Events</p>
    </div>

    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>Loading timeline...</div>
        </div>
    </div>

    <script>
        async function loadTimeline() {
            const app = document.getElementById('app');

            try {
                const response = await fetch('undaunted_data.json');
                const data = await response.json();

                const extractions = data.extractions || [];
                const nodeMap = new Map();

                // Create unique nodes
                extractions.forEach((ex, idx) => {
                    const type = ex.node_type.toLowerCase();
                    const extractedData = ex.extracted_data;
                    const name = extractedData.name_en || extractedData.name || extractedData.title_en || `Entity ${idx}`;

                    const key = name + type;
                    if (!nodeMap.has(key)) {
                        nodeMap.set(key, {
                            name: name,
                            type: ex.node_type,
                            data: extractedData,
                            passage: ex.passage
                        });
                    }
                });

                const nodes = Array.from(nodeMap.values());
                const events = nodes
                    .filter(n => n.type === 'EVENT' && typeof n.data.year_ce === 'number')
                    .sort((a, b) => a.data.year_ce - b.data.year_ce);

                if (events.length === 0) {
                    app.innerHTML = '<div class="loading">No events found with dates</div>';
                    return;
                }

                // Render timeline
                let html = '<div class="stats">' + events.length + ' events from ' +
                    events[0].data.year_ce + ' to ' + events[events.length - 1].data.year_ce + '</div>';
                html += '<div class="timeline-container">';

                events.forEach(event => {
                    const year = event.data.year_ce;
                    const title = event.data.title_en || event.name;
                    const description = event.data.description || '';
                    const hebrewDate = event.data.date_hebrew || '';

                    html += `
                        <div class="timeline-event">
                            <div class="timeline-event-dot"></div>
                            <div class="event-card">
                                <div class="event-year">${year}${hebrewDate ? ' • ' + hebrewDate : ''}</div>
                                <div class="event-title">${title}</div>
                                ${description ? `<div class="event-description">${description}</div>` : ''}
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                app.innerHTML = html;

            } catch (error) {
                app.innerHTML = '<div class="loading" style="color: #ef4444;">Error loading timeline: ' + error.message + '</div>';
                console.error(error);
            }
        }

        loadTimeline();
    </script>
</body>
</html>
