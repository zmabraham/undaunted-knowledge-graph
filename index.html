<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undaunted Timeline (1880-1950)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a1a1aa;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .zoom-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .zoom-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #e4e4e7;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .zoom-btn:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .zoom-btn.active {
            background: rgba(102, 126, 234, 0.5);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .stats {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #a1a1aa;
            font-size: 0.85rem;
        }

        .timeline-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .timeline-wrapper {
            position: relative;
        }

        .timeline-track {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            transform: translateX(-50%);
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f59e0b;
            border: 3px solid #1a1a2e;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s;
        }

        .timeline-dot:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .event-card {
            position: absolute;
            width: 42%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.6rem 0.8rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .event-card.left {
            right: 54%;
            text-align: right;
        }

        .event-card.right {
            left: 54%;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 1rem;
            width: 1.5rem;
            height: 2px;
            background: #667eea;
        }

        .zoomed-out .event-card::before {
            top: 0.5rem;
        }

        .event-card.left::before {
            right: -2rem;
        }

        .event-card.right::before {
            left: -2rem;
        }

        .event-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(102, 126, 234, 0.3);
            z-index: 100;
        }

        .event-year {
            font-size: 0.65rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .event-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #f4f4f5;
            line-height: 1.2;
        }

        .event-desc {
            font-size: 0.7rem;
            color: #a1a1aa;
            line-height: 1.3;
            margin-top: 0.4rem;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .event-card:hover .event-desc {
            max-height: 500px;
            opacity: 1;
        }

        /* Zoomed out styles */
        .zoomed-out .event-card {
            display: none;
        }

        .zoomed-out .event-card.key-event {
            display: block;
        }

        .zoomed-out .timeline-wrapper {
            height: calc(100vh - 200px) !important;
            max-height: 600px;
        }

        /* Tooltip for zoomed out view */
        .dot-tooltip {
            position: absolute;
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            min-width: 150px;
            max-width: 250px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .zoomed-out .timeline-dot:nth-child(odd) .dot-tooltip {
            left: 100%;
            margin-left: 15px;
            transform: translateY(-50%);
            top: 50% !important;
        }

        .zoomed-out .timeline-dot:nth-child(even) .dot-tooltip {
            right: 100%;
            margin-right: 15px;
            transform: translateY(-50%);
            top: 50% !important;
        }

        .timeline-dot:hover .dot-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .dot-tooltip-year {
            font-size: 0.65rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .dot-tooltip-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #f4f4f5;
            margin-bottom: 0.25rem;
            line-height: 1.2;
        }

        .dot-tooltip-desc {
            font-size: 0.65rem;
            color: #a1a1aa;
            line-height: 1.3;
        }

        .era-markers {
            position: absolute;
            left: 50%;
            font-size: 0.7rem;
            color: #a1a1aa;
            font-weight: 600;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 4px;
            white-space: nowrap;
            z-index: 20;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #a1a1aa;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .event-card {
                width: 90%;
                left: 5% !important;
                right: auto !important;
                text-align: left !important;
            }

            .event-card::before {
                left: -2rem !important;
            }

            .timeline-track {
                left: 0;
            }

            .timeline-dot {
                left: 0;
            }

            .era-markers {
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Undaunted Timeline</h1>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOutBtn" onclick="setZoomLevel('out')">Zoom Out</button>
        <button class="zoom-btn active" id="zoomInBtn" onclick="setZoomLevel('in')">Zoom In</button>
    </div>

    <div class="stats" id="stats">Loading...</div>

    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>Loading timeline...</div>
        </div>
    </div>

    <script>
        let currentZoomLevel = 'in';
        let allEvents = [];

        function setZoomLevel(level) {
            currentZoomLevel = level;
            const app = document.getElementById('app');

            // Update button states
            document.getElementById('zoomOutBtn').classList.toggle('active', level === 'out');
            document.getElementById('zoomInBtn').classList.toggle('active', level === 'in');

            // Update container class
            app.classList.toggle('zoomed-out', level === 'out');

            // Re-render timeline
            renderTimeline();
        }

        async function loadTimeline() {
            try {
                const response = await fetch('undaunted_complete.json');
                const data = await response.json();

                const extractions = data.extractions || [];
                const nodeMap = new Map();

                // Create unique nodes
                extractions.forEach((ex) => {
                    const extractedData = ex.extracted_data;
                    const name = extractedData.title_en || extractedData.name_en || extractedData.name || 'Event';
                    const key = name;

                    if (!nodeMap.has(key)) {
                        nodeMap.set(key, {
                            name: name,
                            data: extractedData
                        });
                    }
                });

                allEvents = Array.from(nodeMap.values())
                    .filter(e => typeof e.data.year_ce === 'number')
                    .sort((a, b) => a.data.year_ce - b.data.year_ce);

                if (allEvents.length === 0) {
                    document.getElementById('app').innerHTML = '<div class="loading">No events found</div>';
                    return;
                }

                renderTimeline();
            } catch (error) {
                document.getElementById('app').innerHTML = '<div class="loading" style="color: #ef4444;">Error loading timeline: ' + error.message + '</div>';
                console.error(error);
            }
        }

        function renderTimeline() {
            const app = document.getElementById('app');
            const stats = document.getElementById('stats');

            const startYear = 1880;
            const endYear = 1950;
            const totalYears = endYear - startYear;

            // Update stats
            stats.innerHTML = `<strong>${allEvents.length}</strong> major events from <strong>${allEvents[0].data.year_ce}</strong> to <strong>${allEvents[allEvents.length - 1].data.year_ce}</strong> (${totalYears} years)`;

            // Define key events for zoomed out view (major milestones)
            const keyEventTitles = [
                'Birth of Yosef Yitzchak Schneersohn',
                'Passing of Rabbi Shmuel (Maharash)',
                'Rashab Accepts Leadership',
                'Opening of Tomchei Temimim',
                'Passing of the Rashab',
                'Rayatz Accepts Leadership',
                'Arrest and Death Sentence',
                'Release from Exile',
                'Departure from Russia',
                'US Visas Granted',
                'Opening of American Yeshivah',
                'Purchase of 770 Eastern Parkway',
                'Passing of the Rayatz',
                'Funeral of the Rayatz'
            ];

            const pixelsPerYear = currentZoomLevel === 'out' ? 10 : 25;
            const cardHeight = currentZoomLevel === 'out' ? 30 : 50;
            const timelineHeight = totalYears * pixelsPerYear;

            // Calculate positions
            const calculatedPositions = allEvents.map((event, index) => {
                const year = event.data.year_ce;
                const proportionalPixels = (year - startYear) * pixelsPerYear;
                const isKeyEvent = keyEventTitles.includes(event.data.title_en || event.name);

                return {
                    event: event,
                    index: index,
                    pixels: proportionalPixels,
                    year: year,
                    isKeyEvent: isKeyEvent
                };
            });

            // Sort by position for overlap detection
            calculatedPositions.sort((a, b) => a.pixels - b.pixels);

            // Adjust positions to prevent overlap
            if (currentZoomLevel === 'in') {
                for (let i = 1; i < calculatedPositions.length; i++) {
                    const current = calculatedPositions[i];
                    const previous = calculatedPositions[i - 1];

                    if (current.pixels - previous.pixels < cardHeight) {
                        current.pixels = previous.pixels + cardHeight;
                    }
                }
            } else {
                // For zoomed out, prevent overlap only for key events
                const keyPositions = calculatedPositions.filter(p => p.isKeyEvent);
                for (let i = 1; i < keyPositions.length; i++) {
                    const current = keyPositions[i];
                    const previous = keyPositions[i - 1];

                    if (current.pixels - previous.pixels < 60) {
                        current.pixels = previous.pixels + 60;
                    }
                }
            }

            // Calculate final timeline height
            const finalTimelineHeight = currentZoomLevel === 'out'
                ? timelineHeight
                : Math.max(timelineHeight, calculatedPositions[calculatedPositions.length - 1].pixels + 200);

            // Create vertical timeline
            let eventsHtml = `<div class="timeline-container"><div class="timeline-wrapper" style="height: ${finalTimelineHeight}px;"><div class="timeline-track"></div>`;

            // Add era markers (positioned at actual decade positions)
            for (let y = 1880; y <= 1950; y += 10) {
                let pixels = (y - startYear) * pixelsPerYear;

                // For zoomed in view, account for overlap adjustments
                if (currentZoomLevel === 'in') {
                    // Find the position of the first event at or after this decade
                    const decadeEvent = calculatedPositions.find(p => p.year >= y);
                    if (decadeEvent && decadeEvent.year === y) {
                        pixels = decadeEvent.pixels;
                    }
                }

                eventsHtml += `<div class="era-markers" style="top: ${pixels}px; margin-top: -10px;">${y}</div>`;
            }

            // Add events in chronological order
            allEvents.forEach((event, index) => {
                const year = event.data.year_ce;
                const title = event.data.title_en || event.name;
                const description = event.data.description || '';
                const dateDetail = event.data.date_detail || '';

                // Find the calculated position for this event
                const positionData = calculatedPositions.find(p => p.index === index);
                const topPixels = positionData ? positionData.pixels : 0;
                const isKeyEvent = positionData ? positionData.isKeyEvent : false;

                // Alternate left/right
                const side = index % 2 === 0 ? 'left' : 'right';

                // For zoomed out view, cards appear below dots without vertical centering
                const cardStyle = currentZoomLevel === 'out'
                    ? `top: ${topPixels + 10}px;`
                    : `top: ${topPixels}px; transform: translateY(-50%);`;

                eventsHtml += `
                    <div class="timeline-dot" style="top: ${topPixels}px;">
                        <div class="dot-tooltip">
                            <div class="dot-tooltip-year">${year}${dateDetail ? ' • ' + dateDetail : ''}</div>
                            <div class="dot-tooltip-title">${title}</div>
                            ${description ? `<div class="dot-tooltip-desc">${description.substring(0, 100)}${description.length > 100 ? '...' : ''}</div>` : ''}
                        </div>
                    </div>
                    <div class="event-card ${side} ${isKeyEvent ? 'key-event' : ''}" style="${cardStyle}">
                        <div class="event-year">${year}${dateDetail ? ' • ' + dateDetail : ''}</div>
                        <div class="event-title">${title}</div>
                        ${description ? `<div class="event-desc">${description}</div>` : ''}
                    </div>
                `;
            });

            eventsHtml += '</div></div>';

            app.innerHTML = eventsHtml;
            app.classList.toggle('zoomed-out', currentZoomLevel === 'out');
        }

        loadTimeline();
    </script>
</body>
</html>
