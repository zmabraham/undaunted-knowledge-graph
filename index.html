<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undaunted - Complete Timeline (1880-1950)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a1a1aa;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .stats {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #a1a1aa;
            font-size: 0.85rem;
        }

        .timeline-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .timeline-wrapper {
            display: flex;
            position: relative;
            min-height: 4000px;
        }

        .timeline-track {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            transform: translateX(-50%);
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f59e0b;
            border: 3px solid #1a1a2e;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .event-card {
            position: absolute;
            width: 45%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .event-card.left {
            right: 52%;
        }

        .event-card.right {
            left: 52%;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 50%;
            width: 2rem;
            height: 2px;
            background: linear-gradient(to right, #667eea, transparent);
        }

        .event-card.left::before {
            right: -2rem;
            background: linear-gradient(to left, #667eea, transparent);
        }

        .event-card.right::before {
            left: -2rem;
        }

        .event-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .event-year {
            font-size: 0.7rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .event-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #f4f4f5;
            line-height: 1.3;
        }

        .event-desc {
            font-size: 0.75rem;
            color: #a1a1aa;
            line-height: 1.4;
            margin-top: 0.5rem;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .event-card:hover .event-desc {
            max-height: 300px;
            opacity: 1;
        }

        .era-markers {
            position: absolute;
            left: 50%;
            font-size: 0.7rem;
            color: #52525b;
            transform: translateX(-50%);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #a1a1aa;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .timeline-wrapper {
                min-height: 3000px;
            }

            .event-card {
                width: 90%;
                left: 5% !important;
                right: auto !important;
            }

            .event-card::before {
                left: -2rem !important;
                background: linear-gradient(to left, #667eea, transparent) !important;
            }

            .timeline-track {
                left: 0;
            }

            .timeline-dot {
                left: 0;
            }

            .era-markers {
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Undaunted - Proportional Timeline</h1>
        <p>All Major Events (1880-1950) • Spacing reflects actual time gaps</p>
    </div>

    <div class="stats" id="stats">Loading...</div>

    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>Loading timeline...</div>
        </div>
    </div>

    <script>
        async function loadTimeline() {
            const app = document.getElementById('app');
            const stats = document.getElementById('stats');

            try {
                const response = await fetch('undaunted_complete.json');
                const data = await response.json();

                const extractions = data.extractions || [];
                const nodeMap = new Map();

                // Create unique nodes
                extractions.forEach((ex) => {
                    const extractedData = ex.extracted_data;
                    const name = extractedData.title_en || extractedData.name_en || extractedData.name || 'Event';
                    const key = name;

                    if (!nodeMap.has(key)) {
                        nodeMap.set(key, {
                            name: name,
                            data: extractedData
                        });
                    }
                });

                const events = Array.from(nodeMap.values())
                    .filter(e => typeof e.data.year_ce === 'number')
                    .sort((a, b) => a.data.year_ce - b.data.year_ce);

                if (events.length === 0) {
                    app.innerHTML = '<div class="loading">No events found</div>';
                    return;
                }

                const startYear = 1880;
                const endYear = 1950;
                const totalYears = endYear - startYear;

                // Update stats
                stats.innerHTML = `<strong>${events.length}</strong> major events from <strong>${events[0].data.year_ce}</strong> to <strong>${events[events.length - 1].data.year_ce}</strong> (${totalYears} years)`;

                // Create vertical timeline
                let eventsHtml = '<div class="timeline-container"><div class="timeline-wrapper"><div class="timeline-track"></div>';

                // Add era markers
                for (let y = 1880; y <= 1950; y += 10) {
                    const position = ((y - startYear) / totalYears) * 100;
                    eventsHtml += `<div class="era-markers" style="top: ${position}%; margin-top: -10px;">${y}</div>`;
                }

                // Add events
                events.forEach((event, index) => {
                    const year = event.data.year_ce;
                    const title = event.data.title_en || event.name;
                    const description = event.data.description || '';
                    const dateDetail = event.data.date_detail || '';

                    // Calculate position (0-100%) based on year
                    const position = ((year - startYear) / totalYears) * 100;

                    // Alternate left/right
                    const side = index % 2 === 0 ? 'left' : 'right';

                    eventsHtml += `
                        <div class="timeline-dot" style="top: ${position}%;"></div>
                        <div class="event-card ${side}" style="top: ${position}%; transform: translateY(-50%);">
                            <div class="event-year">${year}${dateDetail ? ' • ' + dateDetail : ''}</div>
                            <div class="event-title">${title}</div>
                            ${description ? `<div class="event-desc">${description}</div>` : ''}
                        </div>
                    `;
                });

                eventsHtml += '</div></div>';

                app.innerHTML = eventsHtml;

            } catch (error) {
                app.innerHTML = '<div class="loading" style="color: #ef4444;">Error loading timeline: ' + error.message + '</div>';
                console.error(error);
            }
        }

        loadTimeline();
    </script>
</body>
</html>
