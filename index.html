<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undaunted - Complete Timeline (1880-1950)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a1a1aa;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .stats {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #a1a1aa;
            font-size: 0.85rem;
        }

        .timeline-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .timeline-track {
            position: relative;
            height: 300px;
            margin: 3rem 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timeline-line {
            position: absolute;
            top: 50%;
            left: 3%;
            right: 3%;
            height: 2px;
            background: linear-gradient(to right, #667eea, #764ba2);
            transform: translateY(-50%);
        }

        .timeline-event {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .timeline-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f59e0b;
            border: 3px solid #1a1a2e;
            transition: all 0.2s;
        }

        .timeline-event:hover .timeline-dot {
            transform: scale(1.5);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
        }

        .timeline-event:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .tooltip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            min-width: 200px;
            max-width: 300px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .tooltip-year {
            font-size: 0.75rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .tooltip-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #f4f4f5;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .tooltip-desc {
            font-size: 0.75rem;
            color: #a1a1aa;
            line-height: 1.4;
        }

        .era-markers {
            display: flex;
            justify-content: space-between;
            padding: 0 3%;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #71717a;
        }

        .decade-markers {
            display: flex;
            justify-content: space-between;
            padding: 0 3%;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #52525b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #a1a1aa;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .timeline-track {
                height: 200px;
            }

            .tooltip {
                min-width: 150px;
                max-width: 200px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Undaunted - Proportional Timeline</h1>
        <p>All Major Events (1880-1950) • Spacing reflects actual time gaps</p>
    </div>

    <div class="stats" id="stats">Loading...</div>

    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>Loading timeline...</div>
        </div>
    </div>

    <script>
        async function loadTimeline() {
            const app = document.getElementById('app');
            const stats = document.getElementById('stats');

            try {
                const response = await fetch('undaunted_complete.json');
                const data = await response.json();

                const extractions = data.extractions || [];
                const nodeMap = new Map();

                // Create unique nodes
                extractions.forEach((ex) => {
                    const extractedData = ex.extracted_data;
                    const name = extractedData.title_en || extractedData.name_en || extractedData.name || 'Event';
                    const key = name;

                    if (!nodeMap.has(key)) {
                        nodeMap.set(key, {
                            name: name,
                            data: extractedData
                        });
                    }
                });

                const events = Array.from(nodeMap.values())
                    .filter(e => typeof e.data.year_ce === 'number')
                    .sort((a, b) => a.data.year_ce - b.data.year_ce);

                if (events.length === 0) {
                    app.innerHTML = '<div class="loading">No events found</div>';
                    return;
                }

                const startYear = 1880;
                const endYear = 1950;
                const totalYears = endYear - startYear;

                // Update stats
                stats.innerHTML = `<strong>${events.length}</strong> major events from <strong>${events[0].data.year_ce}</strong> to <strong>${events[events.length - 1].data.year_ce}</strong> (${totalYears} years)`;

                // Create proportional timeline
                let eventsHtml = '<div class="timeline-container"><div class="timeline-track"><div class="timeline-line"></div>';

                events.forEach(event => {
                    const year = event.data.year_ce;
                    const title = event.data.title_en || event.name;
                    const description = event.data.description || '';
                    const hebrewDate = event.data.date_detail || '';

                    // Calculate position (0-100%) based on year
                    const position = ((year - startYear) / totalYears) * 100;

                    // Determine vertical position (alternating top/bottom)
                    const index = events.indexOf(event);
                    const isTop = index % 2 === 0;
                    const verticalPos = isTop ? '25%' : '75%';

                    eventsHtml += `
                        <div class="timeline-event" style="left: ${position}%; top: ${verticalPos};">
                            <div class="timeline-dot"></div>
                            <div class="tooltip">
                                <div class="tooltip-year">${year}${hebrewDate ? ' • ' + hebrewDate : ''}</div>
                                <div class="tooltip-title">${title}</div>
                                ${description ? `<div class="tooltip-desc">${description.substring(0, 150)}${description.length > 150 ? '...' : ''}</div>` : ''}
                            </div>
                        </div>
                    `;
                });

                eventsHtml += '</div>';

                // Era markers
                eventsHtml += '<div class="era-markers">';
                eventsHtml += '<span>1880</span>';
                eventsHtml += '<span>1890</span>';
                eventsHtml += '<span>1900</span>';
                eventsHtml += '<span>1910</span>';
                eventsHtml += '<span>1920</span>';
                eventsHtml += '<span>1930</span>';
                eventsHtml += '<span>1940</span>';
                eventsHtml += '<span>1950</span>';
                eventsHtml += '</div>';

                // Decade markers
                eventsHtml += '<div class="decade-markers">';
                for (let y = 1880; y <= 1950; y += 10) {
                    eventsHtml += `<span>${y}</span>`;
                }
                eventsHtml += '</div>';

                eventsHtml += '</div>';

                app.innerHTML = eventsHtml;

            } catch (error) {
                app.innerHTML = '<div class="loading" style="color: #ef4444;">Error loading timeline: ' + error.message + '</div>';
                console.error(error);
            }
        }

        loadTimeline();
    </script>
</body>
</html>
